<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilenVault Profit Engine v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#020617] text-slate-200">
    <div class="max-w-7xl mx-auto">
        <!-- HEADER -->
        <header class="border-b border-slate-800 bg-slate-950/80 backdrop-blur-xl sticky top-0 z-50">
            <div class="px-6 py-5 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-2xl">SV</div>
                    <div class="font-black tracking-tighter text-3xl">SilenVault</div>
                    <span class="text-blue-400 text-sm font-mono">v3.0</span>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="Engine.showDemoModal()" class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-bold text-sm flex items-center gap-2">
                        🇮🇳 Load Indian Demo Data
                    </button>
                    <button onclick="Engine.toggleTheme()" class="w-10 h-10 rounded-2xl bg-slate-800 flex items-center justify-center text-xl">🌙</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 p-6">
            <!-- LEFT: Multi-Product Table -->
            <div class="lg:col-span-7 glass rounded-3xl p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold">Product Portfolio</h2>
                    <div class="flex gap-3">
                        <button onclick="Engine.addProduct()" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-2xl font-bold text-sm">+ Add Product</button>
                        <button onclick="Engine.exportCSV()" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-2xl font-bold text-sm">CSV ↓</button>
                        <button onclick="Engine.exportPDF()" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-2xl font-bold text-sm">PDF ↓</button>
                    </div>
                </div>
                <div id="product-table" class="overflow-auto max-h-[520px]"></div>
                <div class="mt-4 text-xs text-slate-400 mono text-right">Total Products: <span id="total-products">0</span></div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="lg:col-span-5 space-y-6">
                <!-- Mode + Tax -->
                <div class="glass rounded-3xl p-6">
                    <div class="flex gap-2 mb-6">
                        <button id="btn-margin" onclick="Engine.setMode('margin')" class="flex-1 py-4 rounded-2xl font-bold">Margin %</button>
                        <button id="btn-markup" onclick="Engine.setMode('markup')" class="flex-1 py-4 rounded-2xl font-bold">Markup %</button>
                    </div>
                    <div class="grid grid-cols-5 gap-2" id="tax-buttons"></div>
                </div>

                <!-- Charts -->
                <div class="glass rounded-3xl p-6">
                    <h3 class="text-sm font-mono uppercase tracking-widest mb-4">Live Analytics</h3>
                    <canvas id="pieChart" class="mb-6"></canvas>
                    <canvas id="sensitivityChart"></canvas>
                </div>

                <!-- Break-even + Competitor -->
                <div class="glass rounded-3xl p-6 space-y-6">
                    <div>
                        <label class="text-xs font-mono uppercase block mb-2">Fixed Costs (Rent, Ads etc.)</label>
                        <input id="fixed-costs" type="number" value="15000" oninput="Engine.calculateAll()" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 mono text-xl">
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-center">
                        <div class="bg-slate-900/70 rounded-2xl p-4">
                            <div class="text-xs text-slate-400">Break-even Units</div>
                            <div id="breakeven-units" class="text-4xl font-black text-emerald-400">0</div>
                        </div>
                        <div class="bg-slate-900/70 rounded-2xl p-4">
                            <div class="text-xs text-slate-400">Monthly Profit @ 50 units</div>
                            <div id="projected-profit" class="text-4xl font-black text-blue-400">₹0</div>
                        </div>
                    </div>
                </div>

                <!-- Competitor Gap -->
                <div class="glass rounded-3xl p-6">
                    <label class="text-xs font-mono uppercase block mb-2">Competitor Selling Price (₹)</label>
                    <input id="competitor-price" type="number" value="1499" oninput="Engine.calculateAll()" class="w-full bg-slate-900 border border-slate-700 rounded-2xl px-5 py-4 mono text-xl">
                    <div id="gap-result" class="mt-4 text-sm font-medium"></div>
                </div>
            </div>
        </div>

        <!-- History Sidebar (toggleable) -->
        <div id="history-panel" class="hidden fixed right-0 top-0 h-full w-96 bg-slate-950 border-l border-slate-800 p-6 overflow-auto">
            <h3 class="font-bold mb-4">Calculation History</h3>
            <div id="history-list"></div>
        </div>
    </div>

    <!-- DEMO MODAL -->
    <div id="demo-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[9999]">
        <div class="glass w-full max-w-2xl mx-4 rounded-3xl p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black">🇮🇳 Indian Retail Demo Data</h2>
                <button onclick="Engine.hideDemoModal()" class="text-3xl text-slate-400 hover:text-white">×</button>
            </div>
            <div class="grid grid-cols-3 gap-4" id="demo-options">
                <!-- Populated by demo.js -->
            </div>
        </div>
    </div>

    <script src="demo.js"></script>
    <script src="engine.js"></script>
</body>
</html>
